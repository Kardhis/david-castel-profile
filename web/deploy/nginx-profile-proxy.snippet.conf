# Snippet para el Nginx del contenedor functions-frontend.
# Insertar ANTES de `location / { try_files ... }`.
#
# IMPORTANTE: proxy_pass DEBE incluir /profile/ al final.
# Incorrecto: proxy_pass http://HOST:3001/;      → reenvía /es (404 en Next.js)
# Correcto:   proxy_pass http://HOST:3001/profile/;

location ^~ /profile/ {
    proxy_pass http://172.17.0.1:3001/profile/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /profile {
    return 301 /profile/;
}
