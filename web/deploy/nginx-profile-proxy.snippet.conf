# Snippet para el Nginx del contenedor functions-frontend.
# Insertar ANTES de `location / { try_files ... }`.
#
# IMPORTANTE:
# - Puerto con dos puntos: HOST:3000 (nunca /:3000)
# - proxy_pass DEBE terminar en /profile/
# - Desde Docker Compose usar host.docker.internal (ver extra_hosts abajo)
# - NO usar la IP pública del VPS desde el contenedor (suele hacer timeout)
#
# Gateway de la red Compose (obtener con):
#   docker exec functions-frontend sh -c "ip route | awk '/default/ {print \$3}'"
# Suele ser 172.19.0.1 (no 172.17.0.1). Si wget desde el contenedor hace timeout:
#   sudo ufw allow from 172.19.0.0/16 to any port 3000 proto tcp
#
# Incorrecto: proxy_pass http://168.231.84.188:3000/profile/;
# Incorrecto: proxy_pass http://168.231.84.188/:3000/profile/;
# Correcto:   proxy_pass http://172.19.0.1:3000/profile/;

location ^~ /profile/ {
    proxy_pass http://172.19.0.1:3000/profile/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /profile {
    return 301 /profile/;
}
